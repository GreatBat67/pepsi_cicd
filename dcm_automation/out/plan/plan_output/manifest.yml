manifest_version: 2
type: DCM_PROJECT
default_target: PEPSI_DCM_DEV
targets:
  PEPSI_DCM_CICD:
    account_identifier: KIPI-KIPI_PRIMARY
    project_name: CICD_METADATA.DCM_CONFIG.DCM_AUTOMATION_CICD
    project_owner: PSEUDO_ACCOUNTADMIN
    templating_config: cicd
  PEPSI_DCM_DEV:
    account_identifier: KIPI-KIPI_PRIMARY
    project_name: CICD_METADATA.DCM_CONFIG.DCM_AUTOMATION_DEV
    project_owner: PSEUDO_ACCOUNTADMIN
    templating_config: dev
  PEPSI_DCM_QA:
    account_identifier: KIPI-KIPI_PRIMARY
    project_name: CICD_METADATA.DCM_CONFIG.DCM_AUTOMATION_QA
    project_owner: PSEUDO_ACCOUNTADMIN
    templating_config: qa
  PEPSI_DCM_MAIN:
    account_identifier: KIPI-KIPI_PRIMARY
    project_name: CICD_METADATA.DCM_CONFIG.DCM_AUTOMATION_MAIN
    project_owner: PSEUDO_ACCOUNTADMIN
    templating_config: main
templating:
  defaults:
    project_owner_role: PSEUDO_ACCOUNTADMIN
    warehouse: github_cicd_demo_wh
  configurations:
    cicd:
      environment: cicd
      env_suffix: _cicd
      database: PEPSI_DEVOPS_DB_CICD
      schemas:
      - UTILITIES
      - PATIENTS
      - MANAGEMENT
      project_name: CICD_METADATA.DCM_CONFIG.DCM_AUTOMATION_CICD
      project_owner: PSEUDO_ACCOUNTADMIN
      roles:
        DBA_ADMIN: DBA_ADMIN_CICD
        DBA_FR: DBA_FR_CICD
      is_default_target: false
    dev:
      environment: dev
      env_suffix: _dev
      database: PEPSI_DEVOPS_DB_DEV
      schemas:
      - UTILITIES
      - PATIENTS
      - MANAGEMENT
      project_name: CICD_METADATA.DCM_CONFIG.DCM_AUTOMATION_DEV
      project_owner: PSEUDO_ACCOUNTADMIN
      roles:
        DBA_ADMIN: DBA_ADMIN_DEV
        DBA_FR: DBA_FR_DEV
      is_default_target: true
    qa:
      environment: qa
      env_suffix: _qa
      database: PEPSI_DEVOPS_DB_QA
      schemas:
      - UTILITIES
      - PATIENTS
      - MANAGEMENT
      project_name: CICD_METADATA.DCM_CONFIG.DCM_AUTOMATION_QA
      project_owner: PSEUDO_ACCOUNTADMIN
      roles:
        DBA_ADMIN: DBA_ADMIN_QA
        DBA_FR: DBA_FR_QA
      is_default_target: false
    main:
      environment: main
      env_suffix: _main
      database: PEPSI_DEVOPS_DB_MAIN
      schemas:
      - UTILITIES
      - PATIENTS
      - MANAGEMENT
      project_name: CICD_METADATA.DCM_CONFIG.DCM_AUTOMATION_MAIN
      project_owner: PSEUDO_ACCOUNTADMIN
      roles:
        DBA_ADMIN: DBA_ADMIN_MAIN
        DBA_FR: DBA_FR_MAIN
      is_default_target: false
