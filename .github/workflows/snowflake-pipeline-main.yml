name: "Snowflake Component: Progression Target - main"
on:
  workflow_call:
    inputs:
      action_type:
        required: true
        type: string

permissions:
  id-token: write
  contents: read

env:
  SNOWFLAKE_ACCOUNT: "KIPI-KIPI_PRIMARY"
  SNOWFLAKE_USER: "github_pepsi_main_user"
  SNOWFLAKE_ROLE: "PSEUDO_ACCOUNTADMIN"
  SNOWFLAKE_WAREHOUSE: "github_cicd_demo_wh"
  SNOWFLAKE_CLI_FEATURES_ENABLE_SNOWFLAKE_PROJECTS: "true"
  SNOWFLAKE_DATABASE: "PEPSI_DEVOPS_DB_MAIN"
  SNOWFLAKE_SCHEMA: "UTILITIES"

jobs:
  main-environment-execution:
    runs-on: ubuntu-latest
    environment: main 
    steps:
      - uses: actions/checkout@v4
      
      - if: inputs.action_type == 'plan'
        name: Execute Dry-Run Mappings
        run: echo "Executing Dry-Run Infrastructure Validation for tier [main]"

      - name: Run Modular Infrastructure Verification (DCM Plan)
        uses: ./.github/workflows/modules/action-dcm-engine
        with:
          dcm_dir: "dcm_automation"
          dcm_target: "PEPSI_DCM_MAIN"
          action_type: "plan"


      - if: inputs.action_type == 'deploy'
        name: Execute Live Infrastructure Deployment
        run: echo "Executing Live Production Deployment for tier [main]"

      - name: Live Deploy to Database Target (DCM Deploy)
        uses: ./.github/workflows/modules/action-dcm-engine
        with:
          dcm_dir: "dcm_automation"
          dcm_target: "PEPSI_DCM_MAIN"
          action_type: "deploy"

