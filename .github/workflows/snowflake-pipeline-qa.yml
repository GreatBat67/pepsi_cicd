name: "Snowflake Component: Progression Target - qa"
on:
  workflow_call:
    inputs:
      action_type:
        required: true
        type: string

permissions:
  id-token: write
  contents: read

env:
  SNOWFLAKE_ACCOUNT: "KIPI-KIPI_PRIMARY"
  SNOWFLAKE_USER: "github_pepsi_qa_user"
  SNOWFLAKE_ROLE: "PSEUDO_ACCOUNTADMIN"
  SNOWFLAKE_WAREHOUSE: "github_cicd_demo_wh"
  SNOWFLAKE_CLI_FEATURES_ENABLE_SNOWFLAKE_PROJECTS: "true"
  SNOWFLAKE_DATABASE: "PEPSI_DEVOPS_DB_QA"
  SNOWFLAKE_SCHEMA: "UTILITIES"

jobs:
  qa-environment-execution:
    runs-on: ubuntu-latest
    environment: qa 
    steps:
      - uses: actions/checkout@v4
      
      - if: inputs.action_type == 'plan'
        name: "DCM Plan — Dry-run against QA target only"
        uses: ./.github/workflows/modules/action-dcm-engine
        with:
          dcm_dir: "dcm_automation"
          dcm_target: "PEPSI_DCM_QA"
          action_type: "plan"

      - if: inputs.action_type == 'deploy'
        name: "DCM Deploy — Apply changes to QA target only"
        uses: ./.github/workflows/modules/action-dcm-engine
        with:
          dcm_dir: "dcm_automation"
          dcm_target: "PEPSI_DCM_QA"
          action_type: "deploy"

