name: "Standard Tier: Automated Snowflake Delivery - Master"
on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - dev
      - qa
      - cicd
      - main
    paths:
      - 'dcm_automation/**'
      - 'Projects/**'
      - 'helper_scripts/**'
      - 'dcm_scripts_template/**'
  push:
    branches:
      - dev
      - qa
      - cicd
      - main
    paths:
      - 'dcm_automation/**'
      - 'Projects/**'
      - 'helper_scripts/**'
      - 'dcm_scripts_template/**'

permissions:
  id-token: write 
  contents: read

jobs:
  dev-environment-plan:
    if: github.event_name == 'pull_request' && github.base_ref == 'dev'
    uses: ./.github/workflows/snowflake-pipeline-dev.yml
    with:
      action_type: 'plan'
    secrets: inherit

  dev-environment-deploy:
    if: github.event_name == 'push' && github.ref_name == 'dev'
    uses: ./.github/workflows/snowflake-pipeline-dev.yml
    with:
      action_type: 'deploy'
    secrets: inherit

  qa-environment-plan:
    if: github.event_name == 'pull_request' && github.base_ref == 'qa'
    uses: ./.github/workflows/snowflake-pipeline-qa.yml
    with:
      action_type: 'plan'
    secrets: inherit

  qa-environment-deploy:
    if: github.event_name == 'push' && github.ref_name == 'qa'
    uses: ./.github/workflows/snowflake-pipeline-qa.yml
    with:
      action_type: 'deploy'
    secrets: inherit

  cicd-environment-plan:
    if: github.event_name == 'pull_request' && github.base_ref == 'cicd'
    uses: ./.github/workflows/snowflake-pipeline-cicd.yml
    with:
      action_type: 'plan'
    secrets: inherit

  cicd-environment-deploy:
    if: github.event_name == 'push' && github.ref_name == 'cicd'
    uses: ./.github/workflows/snowflake-pipeline-cicd.yml
    with:
      action_type: 'deploy'
    secrets: inherit

  main-environment-plan:
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    uses: ./.github/workflows/snowflake-pipeline-main.yml
    with:
      action_type: 'plan'
    secrets: inherit

  main-environment-deploy:
    if: github.event_name == 'push' && github.ref_name == 'main'
    uses: ./.github/workflows/snowflake-pipeline-main.yml
    with:
      action_type: 'deploy'
    secrets: inherit
