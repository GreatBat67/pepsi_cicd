# Adaptive One-way PR gate enforcement workflow
name: Enforce One-Way PR Gate
on:
  pull_request:
    types: [opened, reopened, synchronize, edited]
    branches:
      - qa
      - cicd
      - main

jobs:
  gate-check:
    runs-on: ubuntu-latest
    steps:
      - name: Enforce dev -> qa gate
        if: github.event.pull_request.base.ref == 'qa' && github.event.pull_request.head.ref != 'dev'
        run: |
          echo "::error::PR routing violation. Merges into target branch 'qa' must originate from source branch 'dev'."
          exit 1
      - name: Enforce qa -> cicd gate
        if: github.event.pull_request.base.ref == 'cicd' && github.event.pull_request.head.ref != 'qa'
        run: |
          echo "::error::PR routing violation. Merges into target branch 'cicd' must originate from source branch 'qa'."
          exit 1
      - name: Enforce cicd -> main gate
        if: github.event.pull_request.base.ref == 'main' && github.event.pull_request.head.ref != 'cicd'
        run: |
          echo "::error::PR routing violation. Merges into target branch 'main' must originate from source branch 'cicd'."
          exit 1
      - name: Gate passed
        run: echo "Branch pipeline trajectory validated successfully."
